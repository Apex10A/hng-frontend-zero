<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testable Todo Item Card - Stage 0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <article class="todo-card" data-testid="test-todo-card">
            <header class="todo-header">
                <div class="todo-title-group">
                    <input type="checkbox" id="todo-complete" data-testid="test-todo-complete-toggle">
                    <label for="todo-complete" class="sr-only">Mark task as complete</label>
                    <h2 class="todo-title" data-testid="test-todo-title">Complete HNG Stage 0 Task</h2>
                </div>
                <div class="todo-actions">
                    <button class="btn-icon" data-testid="test-todo-edit-button" aria-label="Edit task">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button class="btn-icon" data-testid="test-todo-delete-button" aria-label="Delete task">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </div>
            </header>

            <p class="todo-description" data-testid="test-todo-description">
                Finish the frontend implementation of the todo card with all required test attributes and accessibility features.
            </p>

            <div class="todo-meta">
                <div class="meta-item">
                    <span class="label">Priority:</span>
                    <strong class="badge priority-high" data-testid="test-todo-priority">High</strong>
                </div>
                <div class="meta-item">
                    <span class="label">Status:</span>
                    <strong class="badge status-pending" data-testid="test-todo-status">Pending</strong>
                </div>
            </div>

            <div class="todo-dates">
                <div class="date-item">
                    <span class="label">Due Date:</span>
                    <time datetime="2026-04-16T23:59" data-testid="test-todo-due-date">Due Apr 16, 2026</time>
                </div>
                <div class="date-item" aria-live="polite">
                    <span class="label">Time Remaining:</span>
                    <time data-testid="test-todo-time-remaining">Calculating...</time>
                </div>
            </div>

            <footer class="todo-footer">
                <ul class="todo-tags" data-testid="test-todo-tags" role="list">
                    <li class="tag" data-testid="test-todo-tag-work">work</li>
                    <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
                    <li class="tag">frontend</li>
                </ul>
            </footer>
        </article>
    </main>
    <script src="script.js"></script>
</body>
</html>
